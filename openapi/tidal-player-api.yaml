openapi: 3.1.0
info:
  title: Littoral - Local API
  version: 1.2.0
  description: |
    Local API exposed by Littoral (Tidal Electron player).

    - REST endpoints to query state, control playback, search the catalogue, and manage the queue.
    - WebSocket on `/events`: initial snapshot on connect, then `now-playing`, `playback-state`, `position`, and `auth-changed` events (schemas at the end of this document).
servers:
  - url: http://127.0.0.1:7143
    description: Local instance (default port, configurable)

tags:
  - name: status
  - name: playback
  - name: queue
  - name: catalogue
  - name: auth

paths:
  /health:
    get:
      tags: [status]
      operationId: getHealth
      summary: Health check
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Health'

  /now-playing:
    get:
      tags: [playback]
      operationId: getNowPlaying
      summary: Current track and player state
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NowPlaying'

  /playback/play:
    post:
      tags: [playback]
      operationId: play
      summary: Resume / start playback
      responses:
        '204': { description: OK }

  /playback/pause:
    post:
      tags: [playback]
      operationId: pause
      summary: Pause playback
      responses:
        '204': { description: OK }

  /playback/toggle:
    post:
      tags: [playback]
      operationId: togglePlayPause
      summary: Toggle play/pause
      responses:
        '204': { description: OK }

  /playback/next:
    post:
      tags: [playback]
      operationId: next
      summary: Next track
      responses:
        '204': { description: OK }

  /playback/previous:
    post:
      tags: [playback]
      operationId: previous
      summary: Previous track
      responses:
        '204': { description: OK }

  /playback/seek:
    post:
      tags: [playback]
      operationId: seek
      summary: Seek to a position (in seconds)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [positionSeconds]
              properties:
                positionSeconds:
                  type: number
                  minimum: 0
      responses:
        '204': { description: OK }

  /playback/volume:
    post:
      tags: [playback]
      operationId: setVolume
      summary: Set volume (0..100)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [volume]
              properties:
                volume:
                  type: integer
                  minimum: 0
                  maximum: 100
      responses:
        '204': { description: OK }

  /queue:
    get:
      tags: [queue]
      operationId: getQueue
      summary: Get the Tidal queue (upcoming tracks)
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Queue'

  /queue/enqueue:
    post:
      tags: [queue]
      operationId: enqueueTrack
      summary: Add a track to the queue
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [trackId]
              properties:
                trackId:
                  type: string
                  description: Tidal track identifier
                position:
                  type: string
                  enum: [end, next]
                  default: end
      responses:
        '200':
          description: Item added
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Queue'

  /catalogue/search:
    get:
      tags: [catalogue]
      operationId: search
      summary: Search the Tidal catalogue
      parameters:
        - in: query
          name: q
          required: true
          schema: { type: string, minLength: 1 }
        - in: query
          name: types
          schema:
            type: string
            description: Comma-separated types (tracks,albums,artists,playlists)
            default: tracks,albums,artists,playlists
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 50, default: 20 }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResults'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /catalogue/tracks/{trackId}:
    get:
      tags: [catalogue]
      operationId: getTrack
      parameters:
        - in: path
          name: trackId
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Track' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /auth/status:
    get:
      tags: [auth]
      operationId: getAuthStatus
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthStatus' }

  /auth/login:
    post:
      tags: [auth]
      operationId: startLogin
      summary: Displays the Tidal login page in the WebView (single login; the token is then captured by intercepting WebView requests)
      responses:
        '202':
          description: WebView redirected to the login page
          content:
            application/json:
              schema:
                type: object
                properties:
                  authorizationUrl: { type: string }

  /auth/logout:
    post:
      tags: [auth]
      operationId: logout
      summary: Clears the WebView localStorage / cookies and redirects to the login page
      responses:
        '204': { description: OK }

components:
  responses:
    Unauthorized:
      description: Not authenticated with Tidal
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }

  schemas:
    Health:
      type: object
      required: [status, version]
      properties:
        status: { type: string, enum: [ok] }
        version: { type: string }
        uptimeSeconds: { type: number }

    Error:
      type: object
      required: [code, message]
      properties:
        code: { type: string }
        message: { type: string }

    PlaybackState:
      type: string
      enum: [idle, playing, paused, buffering]

    Track:
      type: object
      required: [id, title, artists, durationSeconds]
      properties:
        id: { type: string }
        title: { type: string }
        artists:
          type: array
          items: { $ref: '#/components/schemas/Artist' }
        album: { $ref: '#/components/schemas/AlbumRef' }
        durationSeconds: { type: number }
        isrc: { type: string }
        explicit: { type: boolean }
        coverUrl: { type: string, format: uri }
        url: { type: string, format: uri, description: Tidal URL }

    Artist:
      type: object
      required: [id, name]
      properties:
        id: { type: string }
        name: { type: string }
        pictureUrl: { type: string, format: uri }

    AlbumRef:
      type: object
      required: [id, title]
      properties:
        id: { type: string }
        title: { type: string }
        coverUrl: { type: string, format: uri }

    Album:
      allOf:
        - $ref: '#/components/schemas/AlbumRef'
        - type: object
          properties:
            artists:
              type: array
              items: { $ref: '#/components/schemas/Artist' }
            releaseDate: { type: string, format: date }
            numberOfTracks: { type: integer }

    Playlist:
      type: object
      required: [id, title]
      properties:
        id: { type: string }
        title: { type: string }
        description: { type: string }
        coverUrl: { type: string, format: uri }
        numberOfTracks: { type: integer }

    NowPlaying:
      type: object
      required: [state]
      properties:
        state: { $ref: '#/components/schemas/PlaybackState' }
        track: { $ref: '#/components/schemas/Track' }
        positionSeconds: { type: number }
        durationSeconds: { type: number }
        volume: { type: integer, minimum: 0, maximum: 100 }
        shuffle: { type: boolean }
        repeat: { type: string, enum: [off, one, all] }
        updatedAt: { type: string, format: date-time }

    QueueItem:
      type: object
      required: [id, trackId, addedAt]
      properties:
        id: { type: string, description: Local identifier of the queue item }
        trackId: { type: string }
        addedAt: { type: string, format: date-time }
        track: { $ref: '#/components/schemas/Track' }

    Queue:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/QueueItem' }

    SearchResults:
      type: object
      properties:
        tracks:
          type: array
          items: { $ref: '#/components/schemas/Track' }
        albums:
          type: array
          items: { $ref: '#/components/schemas/Album' }
        artists:
          type: array
          items: { $ref: '#/components/schemas/Artist' }
        playlists:
          type: array
          items: { $ref: '#/components/schemas/Playlist' }

    AuthStatus:
      type: object
      required: [authenticated]
      properties:
        authenticated: { type: boolean }
        scopes:
          type: array
          items: { type: string }
        expiresAt: { type: string, format: date-time }
        userId: { type: string }
        countryCode: { type: string }

    Event:
      oneOf:
        - $ref: '#/components/schemas/EventNowPlaying'
        - $ref: '#/components/schemas/EventPlaybackState'
        - $ref: '#/components/schemas/EventPosition'
        - $ref: '#/components/schemas/EventAuthChanged'
      discriminator:
        propertyName: type

    EventBase:
      type: object
      required: [type, timestamp]
      properties:
        type: { type: string }
        timestamp: { type: string, format: date-time }

    EventNowPlaying:
      description: "WebSocket event — emitted on track change, or when resuming from pause (so clients that join mid-playback receive the current track in the initial snapshot)."
      allOf:
        - $ref: '#/components/schemas/EventBase'
        - type: object
          required: [type, payload]
          properties:
            type: { const: now-playing }
            payload:
              type: object
              properties:
                track: { $ref: '#/components/schemas/Track' }

    EventPlaybackState:
      description: "WebSocket event — emitted only on state changes (idle → playing, playing → paused, etc.). Not triggered if the track changes without a state change."
      allOf:
        - $ref: '#/components/schemas/EventBase'
        - type: object
          required: [type, payload]
          properties:
            type: { const: playback-state }
            payload:
              type: object
              required: [state]
              properties:
                state: { $ref: '#/components/schemas/PlaybackState' }

    EventPosition:
      description: "WebSocket event — emitted periodically during playback (~1×/s) with the current position in the track."
      allOf:
        - $ref: '#/components/schemas/EventBase'
        - type: object
          required: [type, payload]
          properties:
            type: { const: position }
            payload:
              type: object
              required: [positionSeconds]
              properties:
                positionSeconds: { type: number }
                durationSeconds: { type: number }

    EventAuthChanged:
      description: "WebSocket event — emitted when the Tidal token is captured (login detected in the WebView) or lost (logout)."
      allOf:
        - $ref: '#/components/schemas/EventBase'
        - type: object
          required: [type, payload]
          properties:
            type: { const: auth-changed }
            payload: { $ref: '#/components/schemas/AuthStatus' }
